# Test profili: dis altyapiya (Solr, dosya-H2) bagimli olmadan context yuklensin.
# Solr/import bilesenleri @Profile("!test") ile devre disi.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# JwtService @Value alanlari icin (gecerli 512-bit base64 gerekli)
jwt.secret=dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtMTIzNDU2Nzg5MA==
jwt.expiration-ms=3600000

# SolrConfig @Value alanlari icin (bean olusur ama teste baglanmaz)
solr.base-url=http://localhost:8983/solr
solr.collection=hotels
app.import.csv-path=data/hotels_subset.csv
