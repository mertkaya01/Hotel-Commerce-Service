spring.application.name=hotel-reservation

# H2 - dosya tabanli, uygulama kapansa bile veri kaybolmaz (in-memory degil)
spring.datasource.url=jdbc:h2:file:./data/hoteldb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web konsolu - http://localhost:8080/h2-console uzerinden tablolari gorsel inceleyebiliriz
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Docker'da tarayici istegi container'a ag gecidi IP'siyle ulasir; console varsayilan olarak
# yalnizca localhost'a izin verir. Bu ayar Docker uzerinden erisime izin verir (demo icin).
spring.h2.console.settings.web-allow-others=true

# Hibernate entity'lerden tablolari otomatik olustursun/guncellesin (gelistirme icin;
# production'da bunun yerine Flyway/Liquibase migration kullanilir)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
# NOT: gercek bir production projede bu secret asla kod/repo icinde durmaz, environment variable
# veya bir secret manager'dan okunur. Staj projesi oldugu ve local calistigi icin burada tutuyoruz.
jwt.secret=NhSbYUV+HqOh0HW22AkYhcV6wyGojFNuOjVB7wZNtDaxHIdaAmjpsGLZg3SlscY9rW9R8vW3xFDu+jumzvjaVg==
jwt.expiration-ms=86400000

# Solr
solr.base-url=http://localhost:8983/solr
solr.collection=hotels

# CSV import (classpath resource)
app.import.csv-path=data/hotels_subset.csv

# Fotograf yukleme: dosyalar bu klasore kaydedilir, /uploads/** adresinden servis edilir.
# NOT: production'da kalici disk/object storage (S3 vb.) kullanilmali.
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
