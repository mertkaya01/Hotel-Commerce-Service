# Render Blueprint — backend + Solr (frontend Vercel'de).
# Render Dashboard > Blueprints > bu repo ile oluştur. Bazı alanları (SOLR_BASE_URL,
# APP_CORS_ORIGINS) deploy sonrası dashboard'dan doldurman gerekir — DEPLOY.md'ye bak.
services:
  # 1) Apache Solr — arama motoru
  - type: web
    name: hotel-solr
    runtime: image
    image:
      url: solr:9.10
    region: frankfurt
    plan: free
    # Solr imajinin belgelenmis kullanimi (docker-compose.yml ile ayni): entrypoint
    # docker-entrypoint.sh bu komutu calistirir ve 'hotels' core'unu olusturur.
    # NOT: burada 'bash -c "..."' KULLANMA — Render tirnaklari oldugu gibi geciriyor,
    # bash tum satiri tek komut adi sanip 'command not found' (exit 127) veriyor.
    dockerCommand: solr-precreate hotels
    envVars:
      # Solr, Render'in bekledigi portu dinlesin (Render'in varsayilan PORT'u 10000).
      # Solr varsayilan 8983'te acilirsa Render servisi "canli" goremez.
      - key: SOLR_PORT
        value: "10000"
      - key: SOLR_HEAP
        value: 300m

  # 2) Spring Boot backend
  - type: web
    name: hotel-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    envVars:
      # 512MB RAM'e sığması için JVM heap sınırı
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx350m
      # Solr servisinin herkese açık adresi — deploy sonrası dashboard'dan gir:
      # https://hotel-solr-XXXX.onrender.com/solr
      - key: SOLR_BASE_URL
        sync: false
      # Vercel frontend origin'i — örn. https://senin-projen.vercel.app
      - key: APP_CORS_ORIGINS
        sync: false
