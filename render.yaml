# Render Blueprint — backend + Solr (frontend Vercel'de).
# Render Dashboard > Blueprints > bu repo ile oluştur. Bazı alanları (SOLR_BASE_URL,
# APP_CORS_ORIGINS) deploy sonrası dashboard'dan doldurman gerekir — DEPLOY.md'ye bak.
services:
  # 1) Apache Solr — arama motoru
  - type: web
    name: hotel-solr
    runtime: image
    image:
      url: solr:9.10
    region: frankfurt
    plan: free
    # DIKKAT: Render'in dockerCommand'i imajin CMD'sini degil ENTRYPOINT'ini ezer.
    # Bu yuzden docker-entrypoint.sh'i ACIKCA cagirmak zorundayiz; o script
    # 'init-var-solr' ile /var/solr/data'yi olusturur (imajda bu klasor bos gelir).
    # Sadece 'solr-precreate hotels' yazarsak entrypoint atlanir ve
    # "cp: cannot create directory '/var/solr/data/hotels'" ile patlar.
    # Ayrica 'bash -c "..."' da KULLANMA — Render tirnaklari oldugu gibi geciriyor.
    dockerCommand: docker-entrypoint.sh solr-precreate hotels
    envVars:
      # Solr, Render'in bekledigi portu dinlesin (Render'in varsayilan PORT'u 10000).
      # Solr varsayilan 8983'te acilirsa Render servisi "canli" goremez.
      - key: SOLR_PORT
        value: "10000"
      # 512MB'lik kutuda heap disi (metaspace, thread, buffer) ~150-200MB tutuyor.
      # 300m heap ile toplam sinira dayanip container OOM-kill yiyorduk; 256m daha
      # guvenli — 5000 kucuk dokuman icin fazlasiyla yeterli.
      # NOT: Solr imaji -XX:+CrashOnOutOfMemoryError ile acilir, yani HERHANGI bir
      # OOM'da servis komple cokuyor (yavaslamiyor).
      - key: SOLR_HEAP
        value: 256m

  # 2) Spring Boot backend
  - type: web
    name: hotel-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    envVars:
      # 512MB RAM'e sığması için JVM heap sınırı
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx350m
      # Solr servisinin herkese açık adresi — deploy sonrası dashboard'dan gir:
      # https://hotel-solr-XXXX.onrender.com/solr
      - key: SOLR_BASE_URL
        sync: false
      # Vercel frontend origin'i — örn. https://senin-projen.vercel.app
      - key: APP_CORS_ORIGINS
        sync: false
