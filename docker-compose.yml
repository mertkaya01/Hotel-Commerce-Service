services:
  solr:
    image: solr:9.10
    container_name: hotel-solr
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
    command:
      - solr-precreate
      - hotels
    healthcheck:
      # backend, Solr hazir olmadan baslamasin diye
      test: ["CMD-SHELL", "curl -f http://localhost:8983/solr/admin/cores?action=STATUS || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build: ./backend
    container_name: hotel-backend
    depends_on:
      solr:
        condition: service_healthy
    environment:
      # container agi icinde Solr'a servis adiyla erisilir (localhost degil)
      SOLR_BASE_URL: http://solr:8983/solr
    ports:
      - "8080:8080"
    volumes:
      # H2 dosyasi kalici olsun -> her restart'ta CSV tekrar import edilmesin
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hotel-frontend
    depends_on:
      - backend
    ports:
      # host:4200 -> nginx:80 ; tarayicidan http://localhost:4200
      - "4200:80"
    restart: unless-stopped

volumes:
  solr_data:
  backend_data:
